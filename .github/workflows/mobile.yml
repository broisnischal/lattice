name: Mobile

# iOS + Android builds of the same web frontend, packaged with Capacitor.
# The desktop pipeline (release.yml) is untouched — this is additive.
# Triggers on a version tag (e.g. `v0.1.0`) or a manual dispatch.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # required to create the release + upload assets

jobs:
  # ---------------------------------------------------------------- Android
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    # Surface the keystore secret as a job-level env so `if:` conditions can
    # test it (secrets are not directly readable inside `if:` expressions).
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # --- frontend + Capacitor sync ---------------------------------
      - name: Install frontend deps
        run: npm --prefix frontend ci || npm --prefix frontend install

      - name: Build web bundle
        run: npm --prefix frontend run build

      - name: Capacitor sync (android)
        run: npx cap sync android
        working-directory: frontend

      # --- debug APK (always; no signing needed) ---------------------
      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --stacktrace

      - name: Stage debug APK
        run: cp frontend/android/app/build/outputs/apk/debug/app-debug.apk reader-android.apk

      # --- signed release build (only if keystore secrets present) ---
      # Requires GitHub secrets: ANDROID_KEYSTORE_BASE64,
      # ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD.
      - name: Decode signing keystore
        id: keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "path=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK + AAB
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: frontend/android
        run: |
          ./gradlew assembleRelease bundleRelease --stacktrace \
            -PRELEASE_STORE_FILE="${{ steps.keystore.outputs.path }}" \
            -PRELEASE_STORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -PRELEASE_KEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -PRELEASE_KEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"
          cp app/build/outputs/apk/release/app-release.apk "$GITHUB_WORKSPACE/reader-android-release.apk"
          cp app/build/outputs/bundle/release/app-release.aab "$GITHUB_WORKSPACE/reader-android.aab"

      - name: Note about signing
        if: ${{ env.ANDROID_KEYSTORE_BASE64 == '' }}
        run: |
          echo "::notice::No ANDROID_KEYSTORE_BASE64 secret set — shipping the debug APK only."
          echo "For a Play Store build add ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD."

      # --- artifacts + release ---------------------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reader-android
          path: |
            reader-android.apk
            reader-android-release.apk
            reader-android.aab
          if-no-files-found: warn

      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            reader-android.apk
            reader-android-release.apk
            reader-android.aab
          fail_on_unmatched_files: false
          generate_release_notes: true
          draft: false
          name: Reader ${{ github.ref_name }}

  # ---------------------------------------------------------------- iOS
  # Produces an UNSIGNED iOS Simulator build (no Apple cert required). A real
  # device .ipa needs signing secrets (see the commented section below), so we
  # don't fail the workflow when they're absent.
  ios:
    name: iOS (Simulator, unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        run: npm --prefix frontend ci || npm --prefix frontend install

      - name: Build web bundle
        run: npm --prefix frontend run build

      - name: Capacitor sync (ios)
        run: npx cap sync ios
        working-directory: frontend

      # Capacitor 8 uses Swift Package Manager, so the project is App.xcodeproj
      # (no standalone .xcworkspace). Scheme name is "App".
      - name: Build unsigned simulator app
        run: |
          xcodebuild \
            -project frontend/ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip the .app
        run: |
          APP=$(find build/Build/Products -maxdepth 2 -name '*.app' | head -1)
          echo "Found app: $APP"
          ditto -c -k --keepParent "$APP" reader-ios-simulator.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reader-ios-simulator
          path: reader-ios-simulator.zip
          if-no-files-found: error

      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: reader-ios-simulator.zip
          fail_on_unmatched_files: false
          generate_release_notes: true
          draft: false
          name: Reader ${{ github.ref_name }}

      # --- Real device .ipa (requires an Apple Developer account) ----
      # This is intentionally left as commented reference. To emit a signed
      # device .ipa, add these GitHub secrets and uncomment:
      #   APPLE_CERTIFICATE_BASE64     - base64 of your .p12 distribution cert
      #   APPLE_CERTIFICATE_PASSWORD   - password for the .p12
      #   APPLE_PROVISIONING_PROFILE   - base64 of the .mobileprovision
      #   APPLE_TEAM_ID                - your 10-char Apple Team ID
      #
      # - name: Import signing assets
      #   env:
      #     APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      #     APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #     APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
      #   run: |
      #     # Create a temp keychain, import the .p12, install the profile...
      # - name: Archive + export signed .ipa
      #   run: |
      #     xcodebuild -project frontend/ios/App/App.xcodeproj -scheme App \
      #       -configuration Release -sdk iphoneos -archivePath build/App.xcarchive \
      #       DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} archive
      #     xcodebuild -exportArchive -archivePath build/App.xcarchive \
      #       -exportOptionsPlist ExportOptions.plist -exportPath build/ipa
